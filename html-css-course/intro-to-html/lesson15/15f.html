<!doctype html>
<html>
	<body>

					object-fit: cover;

				"
			/>
			<div
				style="
					position: absolute;
					right: 0px;
					top: 15px;
					color: white;
					background-color: black;

					font-size: 22px;
					padding-left: 20px;
					padding-right: 20px;
					padding-top: 12px;
					padding-bottom: 12px;
					cursor: pointer;

			>
				20% OFF
			</div>

			<div

					background-color: rgba(255, 255, 255, 0.8);

			>
				<div
					style="
						color: black;
						background-color: white;
						position: absolute;
						top: 40px;
						left: 165px;

						font-size: 20px;
						font-weight: 500;
						border-style: solid;
						border-width: 2px;

						padding-top: 12px;
						padding-bottom: 12px;
