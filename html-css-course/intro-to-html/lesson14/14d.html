<!doctype html>
<html>
  <body style="height: 3000px">
    <div
      class="sidebar"
      style="
        color: white;
        background-color: green;
        width: 100px;
        position: fixed;
        top: 0px;
        right: 0px;
        bottom: 0px;
      "
    >
      right sidebar
    </div>

    <div
      class="overlay"
      style="
        position: fixed;
        background-color: rgba(0, 0, 0, 0.5);
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      "
    >
      <div
        class="modal"
        style="
          background-color: white;
          border-radius: 5px;
          width: 300px;
          padding: 15px;
        "
      >
        <div
          style="
            font-weight: bold;
            font-family: Arial;
            margin-bottom: 12px;
            font-size: 24px;
          "
        >
          Modal Title
        </div>

        <div style="font-family: Arial; margin-bottom: 12px">
          This is a modal
        </div>

        <button>Close</button>
      </div>
    </div>
  </body>
</html>
