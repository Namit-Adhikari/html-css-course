<!doctype html>
<html>
  <body style="height: 3000px">
    <div
      class="header"
      style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        background-color: white;
        height: 60px;
      "
    >
      <div
        class="left-div"
        style="margin-left: 100px; display: flex; align-items: center"
      >
        <img
          src="../lesson7/cat.jpg"
          style="
            height: 46px;
            width: 46px;
            border-radius: 23px;
            cursor: pointer;
            object-fit: cover;
            margin-right: 12px;
          "
        />
        <div style="font-family: Arial; font-weight: bold">Oliver Cat</div>
      </div>

      <div
        class="right-div"
        style="display: flex; align-items: center; margin-right: 100px"
      >
        <div
          style="
            color: white;
            background-color: blue;
            border-radius: 6px;
            font-family: Arial;
            font-weight: bold;
            padding-left: 15px;
            padding-right: 15px;
            padding-top: 10px;
            padding-bottom: 10px;
            margin-right: 10px;
          "
        >
          Add Friend
        </div>

        <div
          style="
            color: black;
            background-color: rgba(100, 100, 100, 0.2);
            border-radius: 6px;
            font-family: Arial;
            font-weight: bold;
            padding-left: 15px;
            padding-right: 15px;
            padding-top: 10px;
            padding-bottom: 10px;
          "
        >
          Message
        </div>
      </div>
    </div>
  </body>
</html>
