<!-- 3D Click -->

<style>
  .click-button{
    color: white;
    background-color: rgb(46, 164, 79);
    border: none;
    cursor: pointer;
    padding-left: 6px;
    padding-right: 6px;
    box-shadow: 1px 1px 1px rgb(0, 0, 0, 0.2);
    transition: box-shadow 0.15s, margin-left 0.15s margin-top 0.15s;
  }
  .click-button:active{
    box-shadow: none;
    margin-left: 1px;
    margin-top: 1px;
  }
</style>

<button class="click-button">
  Shadow
</button>
