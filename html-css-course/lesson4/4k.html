<!-- Margin and Padding together -->

<style>
  .buttons{
    color: white;
    background-color: green;
    border: none;
    font-size: 18;
    cursor: pointer;
    padding-top: 8px;
    padding-bottom: 8px;
    padding-left: 15px;
    padding-right: 15px;
    margin-left: 10px;
    margin-right: 10px;
    transition: padding 0.15s, margin 0.15s;
  }
  .buttons:hover{
    padding-left: 25px;
    padding-right: 25px;
    margin-left: 0px;
    margin-right: 0px;
  }
</style>

<button class="buttons">
  One
</button>

<button class="buttons">
  Two
</button>

<button class="buttons">
  Three
</button>
