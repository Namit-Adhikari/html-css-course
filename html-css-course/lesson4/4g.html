<!-- Use the Chrome DevTools to get the exact color for the subscribe button and upadate it in the code. -->

<style>
  .subscribe-botton {
    background-color: #cc0000;
    color: white;
    border: none;
    padding-top: 10px;
    padding-bottom: 10px;
    padding-left: 16px;
    padding-right: 16px;
    border-radius: 4px;
    cursor: pointer;
    margin-right: 8px;
    transition: opacity 0.15s;
  }
  .subscribe-botton:hover{
    opacity: 0.7;
  }
  .subscribe-botton:active{
    opacity: 0.5;
  }
  .join-botton {
    background-color: white;
    color: rgb(41, 118, 211);
    border-color: rgb(41, 118, 211);
    border-style: solid;
    border-width: 1px;
    padding-top: 9px;
    padding-bottom: 9px;
    padding-left: 15px;
    padding-right: 15px;
    border-radius: 2px;
    cursor: pointer;
    margin-right: 8px;
    transition: background-color 0.15s, color 0.15s;
  }
  .join-botton:hover{
    color: white;
    background-color: rgb(41, 118, 211);
  }
  .join-botton:active{
    opacity: 0.7;
  }
  .tweet-botton {
    background-color: rgb(104, 162, 213);
    color: white;
    font-weight: bold;
    border: none;
    padding-top: 10px;
    padding-bottom: 10px;
    padding-left: 16px;
    padding-right: 16px;
    border-radius: 18px;
    cursor: pointer;
    transition: box-shadow 0.15s;
  }
  .tweet-botton:hover{
    box-shadow: 5px 5px 10px rgb(0, 0, 0, 0.15);
  }
</style>

<button class="subscribe-botton">
  SUBSCRIBE
</button>

<button class="join-botton">
  JOIN
</button>

<button class="tweet-botton">
  Tweet
</button>
